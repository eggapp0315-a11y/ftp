<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- ⭐ 引用外部CSS（關鍵） -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
    <h2>Login</h2>
    <p class="hint">This is a very weak login system</p>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" placeholder="Password" required>
        <button type="submit">Sign in</button>
    </form>

    {% if message %}
        <div class="message {% if 'FLAG' in message %}success{% endif %}">
            {{ message }}
        </div>
    {% endif %}

    <a href="/">← Back</a>
</div>

</body>
</html>
